version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: meanfall_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meanfall
      POSTGRES_USER: meanfall_user
      POSTGRES_PASSWORD: meanfall_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U meanfall_user -d meanfall" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meanfall_net

  redis:
    image: redis:7-alpine
    container_name: meanfall_redis
    restart: unless-stopped
    command: redis-server --requirepass meanfall_redis_secret
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "meanfall_redis_secret", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meanfall_net

  nakama:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meanfall_nakama
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NAKAMA_DATABASE_ADDRESS=postgres://meanfall_user:meanfall_secret@postgres:5432/meanfall?sslmode=disable
      - NAKAMA_RUNTIME_JS_ENTRYPOINT=index.js
    volumes:
      - ./dist:/nakama/data/modules
      - ./nakama-config.yml:/nakama/data/nakama-config.yml
    entrypoint: []
    command: >
      sh -c "/nakama/nakama migrate up --database.address 'postgres://meanfall_user:meanfall_secret@postgres:5432/meanfall?sslmode=disable' && exec /nakama/nakama --config /nakama/data/nakama-config.yml --database.address 'postgres://meanfall_user:meanfall_secret@postgres:5432/meanfall?sslmode=disable'"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:7350/healthcheck || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meanfall_net

  nginx:
    image: nginx:alpine
    container_name: meanfall_nginx
    restart: unless-stopped
    depends_on:
      nakama:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - meanfall_net

volumes:
  postgres_data:
  redis_data:


networks:
  meanfall_net:
    driver: bridge
